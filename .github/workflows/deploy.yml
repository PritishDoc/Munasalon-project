name: 🚀 Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 📤 Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync Files via FTP/SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTP uses 21, SFTP uses 22. Can be set via FTP_PORT secret or defaults to 21
          port: ${{ secrets.FTP_PORT || 21 }}
          # Local folder to deploy (deploying public_html content)
          local-dir: ./public_html/
          # Remote target directory on your hosting server (defaults to public_html/)
          server-dir: ${{ secrets.REMOTE_DIR || './public_html/' }}
          # Exclude configuration files, local database, and dependency folders
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            public_html/database.sqlite
